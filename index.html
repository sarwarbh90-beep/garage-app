<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Gold Auto | Pro Garage Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&display=swap');
        body { background-color: #050505; color: #fff; font-family: 'Segoe UI', sans-serif; }
        .gold-border { border: 2px solid #d4af37; box-shadow: 0 0 20px rgba(212,175,55,0.2); }
        .gold-text { color: #d4af37; }
        .orbitron { font-family: 'Orbitron', sans-serif; }
        .glass-card { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(212,175,55,0.2); }
        .tab-btn.active { background: #d4af37; color: #000; border-radius: 1rem; }
        input, textarea { background: #111 !important; border: 1px solid #333 !important; color: white !important; }
        .hidden { display: none; }
    </style>
</head>
<body class="pb-10">

    <main class="max-w-lg mx-auto p-4 space-y-6">
        <header class="text-center space-y-3">
            <div class="flex justify-center">
                <img src="Gemini_Generated_Image_li9cjgli9cjgli9c.jpg" alt="Logo" class="w-40 h-40 rounded-[2.5rem] gold-border object-cover">
            </div>
            <h1 class="orbitron text-2xl font-black gold-text italic tracking-tighter uppercase">Black Gold Auto</h1>
            <p class="text-[10px] text-slate-500 tracking-[0.4em] font-bold">SALMABAD, BAHRAIN</p>
        </header>

        <nav class="flex gap-2 bg-neutral-900 p-2 rounded-2xl border border-white/5">
            <button onclick="showTab('service')" id="btn-service" class="tab-btn active flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all">Service</button>
            <button onclick="showTab('gallery')" id="btn-gallery" class="tab-btn flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all">Gallery</button>
            <button onclick="showTab('ledger')" id="btn-ledger" class="tab-btn flex-1 py-3 text-[10px] font-black uppercase tracking-widest transition-all">Ledger</button>
        </nav>

        <div id="service-tab" class="space-y-4">
            <div class="glass-card p-5 rounded-[2rem] space-y-4">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] gold-text font-bold uppercase ml-2">Customer Name</label>
                        <input type="text" id="custName" class="w-full p-3 rounded-xl mt-1 text-sm outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] gold-text font-bold uppercase ml-2">Plate Number</label>
                        <input type="text" id="plateNo" class="w-full p-3 rounded-xl mt-1 text-sm outline-none">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] gold-text font-bold uppercase ml-2">Current KM</label>
                        <input type="number" id="currKm" oninput="calcNext()" class="w-full p-3 rounded-xl mt-1 text-sm outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-green-500 font-bold uppercase ml-2">Next Service</label>
                        <input type="number" id="nextKm" class="w-full p-3 rounded-xl mt-1 text-sm outline-none border-green-900">
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="text-[10px] gold-text font-bold uppercase ml-2">Total Bill (BHD)</label>
                        <input type="number" id="totalBill" oninput="calcDue()" class="w-full p-3 rounded-xl mt-1 text-sm outline-none">
                    </div>
                    <div>
                        <label class="text-[10px] text-red-500 font-bold uppercase ml-2">Due Amount</label>
                        <input type="number" id="dueAmt" class="w-full p-3 rounded-xl mt-1 text-sm outline-none">
                    </div>
                </div>

                <div>
                    <label class="text-[10px] gold-text font-bold uppercase ml-2">Photos (Before & After)</label>
                    <div class="grid grid-cols-2 gap-2 mt-1">
                        <input type="file" id="imgBefore" accept="image/*" class="text-[9px] bg-neutral-900 p-2 rounded-lg">
                        <input type="file" id="imgAfter" accept="image/*" class="text-[9px] bg-neutral-900 p-2 rounded-lg">
                    </div>
                </div>

                <button onclick="saveEntry()" class="w-full bg-gradient-to-r from-[#d4af37] to-[#b8860b] text-black py-4 rounded-2xl font-black uppercase text-xs tracking-widest mt-4">Save & Print Receipt</button>
            </div>
        </div>

        <div id="gallery-tab" class="hidden space-y-4">
            <h3 class="gold-text orbitron text-center text-sm font-black italic">Transformation Gallery</h3>
            <div id="gallery-container" class="space-y-6">
                </div>
        </div>

        <div id="ledger-tab" class="hidden space-y-4">
            <div class="flex gap-2">
                <button onclick="exportToExcel()" class="flex-1 bg-green-700 text-white py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest"><i class="fa-solid fa-file-excel mr-2"></i> Export Excel</button>
                <button onclick="clearHistory()" class="flex-1 bg-red-900 text-white py-3 rounded-xl font-bold text-[10px] uppercase tracking-widest"><i class="fa-solid fa-trash mr-2"></i> Clear Records</button>
            </div>
            <div id="history-list" class="space-y-3">
                </div>
        </div>

        <footer class="text-center opacity-40 py-6">
            <p class="text-[9px] font-black gold-text uppercase italic">Mohammed Sarwar • Salmabad • Bahrain</p>
        </footer>
    </main>

    <script>
        function showTab(tab) {
            document.getElementById('service-tab').classList.add('hidden');
            document.getElementById('gallery-tab').classList.add('hidden');
            document.getElementById('ledger-tab').classList.add('hidden');
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

            document.getElementById(tab + '-tab').classList.remove('hidden');
            document.getElementById('btn-' + tab).classList.add('active');
            
            if(tab === 'gallery') loadGallery();
            if(tab === 'ledger') loadLedger();
        }

        function calcNext() {
            let km = document.getElementById('currKm').value;
            document.getElementById('nextKm').value = km ? parseInt(km) + 5000 : "";
        }

        function calcDue() {
            let total = parseFloat(document.getElementById('totalBill').value) || 0;
            // logic can be added for paid amount if needed
        }

        async function toBase64(file) {
            if (!file) return null;
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
            });
        }

        async function saveEntry() {
            const entry = {
                id: Date.now(),
                date: new Date().toLocaleDateString(),
                name: document.getElementById('custName').value,
                plate: document.getElementById('plateNo').value,
                currKm: document.getElementById('currKm').value,
                nextKm: document.getElementById('nextKm').value,
                bill: document.getElementById('totalBill').value,
                due: document.getElementById('dueAmt').value,
                imgB: await toBase64(document.getElementById('imgBefore').files[0]),
                imgA: await toBase64(document.getElementById('imgAfter').files[0])
            };

            if(!entry.name || !entry.plate) return alert("Customer Name & Plate Required!");

            let data = JSON.parse(localStorage.getItem('BG_Master_Data') || '[]');
            data.unshift(entry);
            localStorage.setItem('BG_Master_Data', JSON.stringify(data));
            
            alert("Entry Saved Successfully!");
            sendWhatsApp(entry);
            location.reload();
        }

        function sendWhatsApp(e) {
            const msg = `*BLACK GOLD AUTO SERVICES*%0A` +
                        `----------------------------%0A` +
                        `👤 Customer: ${e.name}%0A` +
                        `🚗 Plate: ${e.plate}%0A` +
                        `📉 Current KM: ${e.currKm}%0A` +
                        `🔔 Next Service: ${e.nextKm}%0A` +
                        `💰 Total Bill: ${e.bill} BHD%0A` +
                        `🚩 Due: ${e.due} BHD%0A` +
                        `----------------------------%0A` +
                        `Proprietor: Mohammed Sarwar`;
            window.open(`https://wa.me/97333598781?text=${msg}`, '_blank');
        }

        function loadGallery() {
            const data = JSON.parse(localStorage.getItem('BG_Master_Data') || '[]');
            const container = document.getElementById('gallery-container');
            container.innerHTML = data.filter(i => i.imgB || i.imgA).map(item => `
                <div class="glass-card rounded-[2rem] overflow-hidden border-b-4 border-yellow-600">
                    <div class="flex h-48 bg-black">
                        <img src="${item.imgB || 'https://via.placeholder.com/150?text=Before'}" class="w-1/2 object-cover border-r border-white/10">
                        <img src="${item.imgA || 'https://via.placeholder.com/150?text=After'}" class="w-1/2 object-cover">
                    </div>
                    <div class="p-4 flex justify-between items-center">
                        <div>
                            <h4 class="gold-text font-black text-sm uppercase">${item.plate}</h4>
                            <p class="text-[10px] text-slate-400 font-bold">${item.name} • ${item.date}</p>
                        </div>
                        <div class="text-right">
                            <p class="text-[9px] text-white font-bold px-2 py-1 bg-yellow-600/20 rounded-lg">TRANSFORMATION</p>
                        </div>
                    </div>
                </div>
            `).join('') || '<p class="text-center opacity-30 text-xs">No gallery photos yet.</p>';
        }

        function loadLedger() {
            const data = JSON.parse(localStorage.getItem('BG_Master_Data') || '[]');
            const list = document.getElementById('history-list');
            list.innerHTML = data.map(item => `
                <div class="glass-card p-4 rounded-2xl flex justify-between items-center border-l-4 border-yellow-600">
                    <div>
                        <p class="text-xs font-black uppercase text-white">${item.name} (${item.plate})</p>
                        <p class="text-[9px] text-slate-500 font-bold uppercase tracking-tighter">${item.date} • Next: ${item.nextKm} KM</p>
                    </div>
                    <div class="text-right">
                        <p class="text-xs font-black gold-text">${item.bill} BHD</p>
                        <p class="text-[9px] font-bold ${item.due > 0 ? 'text-red-500' : 'text-green-500'}">DUE: ${item.due}</p>
                    </div>
                </div>
            `).join('');
        }

        function exportToExcel() {
            const data = JSON.parse(localStorage.getItem('BG_Master_Data') || '[]');
            if(data.length === 0) return alert("No records to export.");
            const ws = XLSX.utils.json_to_sheet(data.map(({imgB, imgA, ...rest}) => rest));
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "ServiceRecords");
            XLSX.writeFile(wb, "BlackGold_Records.xlsx");
        }

        function clearHistory() {
            if(confirm("Delete all records and photos permanently?")) {
                localStorage.removeItem('BG_Master_Data');
                location.reload();
            }
        }
    </script>
</body>
</html>
