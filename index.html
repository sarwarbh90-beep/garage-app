<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Gold Auto Services | Final</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-black text-white font-sans">

    <header class="py-10 flex flex-col items-center bg-gradient-to-b from-[#111] to-black text-center px-4">
        <div class="mb-6">
            <img src="https://files.catbox.moe/u8u42s.png" alt="Black Gold Logo" class="w-80 h-auto rounded-xl shadow-[0_0_50px_rgba(212,175,55,0.4)]">
        </div>
        <h1 class="text-3xl font-black text-[#d4af37] tracking-tighter uppercase mb-1">BLACK GOLD AUTO SERVICES</h1>
        <p class="text-slate-400 text-[10px] tracking-[0.4em] uppercase mb-4 italic">Proprietor: Mohammed Sarwar</p>
    </header>

    <main class="p-6 max-w-xl mx-auto space-y-10">
        
        <section class="bg-[#111] p-6 rounded-3xl border border-[#d4af37]/20 shadow-xl">
            <h3 class="text-[#d4af37] text-lg font-black mb-4 uppercase flex items-center gap-2">
                <i class="fa-solid fa-calendar-check text-red-600"></i> Book Your Service
            </h3>
            <form action="https://formspree.io/f/YOUR_ID" method="POST" class="space-y-4">
                <input type="text" placeholder="Your Name" class="w-full bg-black border border-white/10 p-4 rounded-xl text-sm focus:border-[#d4af37] outline-none">
                <input type="text" placeholder="Car Model (e.g. Nissan/Toyota)" class="w-full bg-black border border-white/10 p-4 rounded-xl text-sm focus:border-[#d4af37] outline-none">
                <select class="w-full bg-black border border-white/10 p-4 rounded-xl text-sm focus:border-[#d4af37] outline-none text-slate-400">
                    <option>Select Service</option>
                    <option>Engine Oil Change</option>
                    <option>Repair/Maintenance</option>
                    <option>Body Shop/Painting</option>
                    <option>Emergency 24/7</option>
                </select>
                <button type="submit" class="w-full bg-[#d4af37] text-black font-black py-4 rounded-xl uppercase tracking-widest active:scale-95 transition-all">Submit Request</button>
            </form>
        </section>

        <section class="text-center py-6 bg-white/5 rounded-3xl border border-dashed border-[#d4af37]/30">
            <h4 class="text-[#d4af37] text-xs font-bold mb-4 uppercase tracking-[0.2em]">Scan to Visit Website</h4>
            <div class="bg-white p-3 inline-block rounded-xl">
                <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://sarwarbh90-beep.github.io/garage-app/" alt="QR Code" class="w-32 h-32">
            </div>
            <p class="text-[9px] text-slate-500 mt-4 uppercase">Black Gold Digital Business Card</p>
        </section>

        <div class="grid grid-cols-1 gap-4">
            <a href="https://chat.whatsapp.com/IeKb9sVFRaD55J9e75ttXd" target="_blank" class="bg-[#25D366] text-white font-black py-5 rounded-2xl flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all text-lg uppercase">
                <i class="fa-brands fa-whatsapp text-2xl"></i> Join WhatsApp
            </a>

            <a href="http://googleusercontent.com/maps.google.com/6" target="_blank" class="bg-white text-black font-black py-5 rounded-2xl flex items-center justify-center gap-3 shadow-xl active:scale-95 transition-all text-lg uppercase border-2 border-[#d4af37]">
                <i class="fa-solid fa-map-location-dot text-red-600 text-2xl"></i> Google Maps
            </a>
        </div>

        <div class="text-center p-6 border-t border-white/5">
            <p class="text-slate-400 text-[10px] uppercase font-bold mb-2 tracking-widest">Salmabad, Bahrain</p>
            <p class="text-[#d4af37] text-xs">Shop No 1517A, Road 427, Block 704</p>
        </div>

    </main>

    <footer class="py-10 text-center text-slate-800 bg-black">
        <p class="text-[8px] uppercase">© 2026 Black Gold Auto Services W.L.L</p>
    </footer>

</body>
</html>
