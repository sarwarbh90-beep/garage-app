<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Black Gold | All Services with Logo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .gold-border { border: 2px solid #d4af37; box-shadow: 0 0 25px rgba(212,175,55,0.3); }
        .glass-card { background: rgba(15, 15, 15, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(212,175,55,0.2); }
        .gold-text { color: #d4af37; }
        .service-icon { font-size: 1.8rem; width: 50px; text-align: center; }
    </style>
</head>
<body class="bg-[#050505] text-white font-sans selection:bg-[#d4af37]">

    <main class="min-h-screen flex flex-col items-center p-6 max-w-lg mx-auto space-y-8 text-center">
        
        <div class="w-full flex justify-center mt-4">
            <img src="Gemini_Generated_Image_li9cjgli9cjgli9c.jpg" 
                 alt="Black Gold Poster" 
                 class="w-full h-auto rounded-[2.5rem] gold-border max-w-[340px]">
        </div>

        <section class="glass-card p-6 rounded-[2.5rem] shadow-2xl relative overflow-hidden w-full text-left">
            <div class="absolute top-0 right-0 bg-red-600 text-white text-[10px] font-black px-4 py-1 rounded-bl-xl uppercase">10% OFF</div>
            
            <h3 class="gold-text text-sm font-black mb-8 uppercase tracking-widest italic flex items-center gap-2">
                <i class="fa-solid fa-screwdriver-wrench text-red-600"></i> Our Premium Services
            </h3>
            
            <div class="space-y-5">
                <label class="flex items-center justify-between p-4 bg-white/5 rounded-3xl border border-white/5 cursor-pointer hover:border-[#d4af37]/50 transition-all">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" value="9.000" class="w-6 h-6 accent-[#d4af37]" onchange="updateBill()" checked>
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-oil-can gold-text service-icon"></i>
                            <div>
                                <span class="text-[13px] font-black block leading-tight">Oil 20W-50 + Filter</span>
                                <span class="text-[10px] text-slate-500 font-bold uppercase">BHD 9.000</span>
                            </div>
                        </div>
                    </div>
                    <i class="fa-solid fa-circle-check text-[#d4af37]"></i>
                </label>

                <label class="flex items-center justify-between p-4 bg-white/5 rounded-3xl border border-white/5 cursor-pointer hover:border-[#d4af37]/50 transition-all">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" value="3.500" class="w-6 h-6 accent-[#d4af37]" onchange="updateBill()">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-laptop-code gold-text service-icon"></i>
                            <div>
                                <span class="text-[13px] font-black block leading-tight">Computer Diagnostic</span>
                                <span class="text-[10px] text-slate-500 font-bold uppercase">BHD 3.500</span>
                            </div>
                        </div>
                    </div>
                </label>

                <label class="flex items-center justify-between p-4 bg-white/5 rounded-3xl border border-white/5 cursor-pointer hover:border-[#d4af37]/50 transition-all">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" value="4.000" class="w-6 h-6 accent-[#d4af37]" onchange="updateBill()">
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-drum-steelpan gold-text service-icon"></i>
                            <div>
                                <span class="text-[13px] font-black block leading-tight">Brake Pad (Front Side)</span>
                                <span class="text-[10px] text-slate-500 font-bold uppercase">BHD 4.000</span>
                            </div>
                        </div>
                    </div>
                </label>

                <label class="flex items-center justify-between p-4 bg-white/5 rounded-3xl border border-white/5 cursor-pointer hover:border-[#d4af37]/50 transition-all">
                    <div class="flex items-center gap-4">
                        <input type="checkbox" value="0.000" class="w-6 h-6 accent-[#d4af37]" disabled>
                        <div class="flex items-center gap-3">
                            <i class="fa-solid fa-snowflake gold-text service-icon"></i>
                            <div>
                                <span class="text-[13px] font-black block leading-tight">AC Repair & Gas</span>
                                <span class="text-[9px] text-red-500 font-bold uppercase">Call for Quote</span>
                            </div>
                        </div>
                    </div>
                </label>
            </div>

            <div class="mt-10 pt-6 border-t border-[#d4af37]/20 flex justify-between items-end">
                <div class="space-y-1">
                    <p class="text-[10px] text-slate-400 uppercase font-black tracking-widest">Total Savings:</p>
                    <p id="savings" class="text-xs text-red-500 font-black italic tracking-widest">BHD 0.900</p>
                </div>
                <div class="text-right">
                    <p class="text-[10px] text-white uppercase font-black tracking-widest">Grand Total:</p>
                    <h2 class="text-4xl font-black gold-text leading-none">BHD <span id="bill">8.100</span></h2>
                </div>
            </div>
        </section>

        <div class="w-full space-y-3">
            <a id="wa" href="https://wa.me/97333598781" target="_blank" class="w-full bg-[#25D366] text-white py-5 rounded-[2rem] font-black text-center shadow-lg active:scale-95 transition-all uppercase text-xs tracking-widest flex items-center justify-center gap-3">
                <i class="fa-brands fa-whatsapp text-2xl"></i> WhatsApp Booking
            </a>
            <a href="tel:+97333598781" class="w-full border-2 border-[#d4af37] text-[#d4af37] py-5 rounded-[2rem] font-black text-center active:scale-95 transition-all uppercase text-xs tracking-widest flex items-center justify-center gap-3">
                <i class="fa-solid fa-phone-flip text-xl"></i> Call: +973 33598781
            </a>
        </div>

        <footer class="pt-6 pb-16 opacity-30">
            <p class="text-[9px] uppercase tracking-[0.5em] font-bold text-[#d4af37]">Mohammed Sarwar | Salmabad, Bahrain</p>
        </footer>

    </main>

    <script>
        function updateBill() {
            let sub = 0;
            const checks = document.querySelectorAll('input[type="checkbox"]:checked:not(:disabled)');
            checks.forEach((c) => { sub += parseFloat(c.value); });
            
            let discount = sub * 0.10;
            let final = sub - discount;
            
            document.getElementById('savings').innerText = "BHD " + discount.toFixed(3);
            document.getElementById('bill').innerText = final.toFixed(3);

            let msg = encodeURIComponent("Hello Black Gold! I want to book services. My Total Estimated Bill is BHD " + final.toFixed(3));
            document.getElementById('wa').href = "https://wa.me/97333598781?text=" + msg;
        }
        updateBill(); // Initial Call
    </script>

</body>
</html>
